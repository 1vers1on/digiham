<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e232b"/>
      <stop offset="1" stop-color="#12151a"/>
    </linearGradient>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#39d98a"/>
      <stop offset="0.5"  stop-color="#3ad0e0"/>
      <stop offset="1"    stop-color="#4c8dff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.72" r="0.6">
      <stop offset="0"   stop-color="#4c8dff" stop-opacity="0.35"/>
      <stop offset="1"   stop-color="#4c8dff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded app-icon tile -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#bg)"/>
  <rect x="16" y="16" width="480" height="480" rx="104" fill="url(#glow)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="103.5" fill="none"
        stroke="#2c333d" stroke-width="1"/>

  <!-- radio waves radiating from the transmit point -->
  <g fill="none" stroke-linecap="round">
    <path d="M256 340 A 88 88 0 0 1 344 252"  stroke="#4c8dff" stroke-width="18" opacity="0.95"/>
    <path d="M256 340 A 140 140 0 0 1 396 200" stroke="#4c8dff" stroke-width="16" opacity="0.55"/>
    <path d="M256 340 A 192 192 0 0 1 448 148" stroke="#4c8dff" stroke-width="14" opacity="0.28"/>
    <path d="M256 340 A 88 88 0 0 0 168 252"  stroke="#3ad0e0" stroke-width="18" opacity="0.95"/>
    <path d="M256 340 A 140 140 0 0 0 116 200" stroke="#3ad0e0" stroke-width="16" opacity="0.55"/>
    <path d="M256 340 A 192 192 0 0 0 64 148"  stroke="#3ad0e0" stroke-width="14" opacity="0.28"/>
  </g>

  <!-- transmit node -->
  <circle cx="256" cy="340" r="20" fill="#e6e9ef"/>
  <circle cx="256" cy="340" r="20" fill="none" stroke="#4c8dff" stroke-width="6"/>

  <!-- waterfall / FT8 tone spectrum bars -->
  <g fill="url(#spectrum)">
    <rect x="150" y="392" width="20" height="34"  rx="6"/>
    <rect x="182" y="380" width="20" height="46"  rx="6"/>
    <rect x="214" y="360" width="20" height="66"  rx="6"/>
    <rect x="246" y="372" width="20" height="54"  rx="6"/>
    <rect x="278" y="352" width="20" height="74"  rx="6"/>
    <rect x="310" y="384" width="20" height="42"  rx="6"/>
    <rect x="342" y="396" width="20" height="30"  rx="6"/>
  </g>
</svg>
